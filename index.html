<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnerG Trader Watchlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #ffffff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00ff88, #00cc6a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            font-size: 1rem;
        }

        .tagline {
            color: #00ff88;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: 12px;
            text-transform: uppercase;
        }

        /* Weekly Leaders Section */
        .leaders-section {
            background: linear-gradient(135deg, rgba(0,255,136,0.1) 0%, rgba(0,212,255,0.1) 100%);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .leaders-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .leaders-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00ff88;
        }

        .leaders-header .crown {
            font-size: 2rem;
        }

        .leaders-header .date-range {
            font-size: 0.85rem;
            color: #888;
            margin-left: auto;
        }

        .leaders-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .leader-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .leader-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.08);
            border-color: rgba(0,255,136,0.3);
        }

        .leader-card.rank-1 {
            background: linear-gradient(135deg, rgba(255,215,0,0.15) 0%, rgba(255,215,0,0.05) 100%);
            border-color: rgba(255,215,0,0.4);
            order: -1;
        }

        .leader-card.rank-1:hover {
            border-color: rgba(255,215,0,0.6);
        }

        .leader-card.rank-2 {
            background: linear-gradient(135deg, rgba(192,192,192,0.15) 0%, rgba(192,192,192,0.05) 100%);
            border-color: rgba(192,192,192,0.4);
        }

        .leader-card.rank-3 {
            background: linear-gradient(135deg, rgba(205,127,50,0.15) 0%, rgba(205,127,50,0.05) 100%);
            border-color: rgba(205,127,50,0.4);
        }

        .rank-badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .rank-1 .rank-badge {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
        }

        .rank-2 .rank-badge {
            background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
            color: #000;
        }

        .rank-3 .rank-badge {
            background: linear-gradient(135deg, #cd7f32, #b87333);
            color: #fff;
        }

        .leader-ticker {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .rank-1 .leader-ticker {
            color: #ffd700;
        }

        .rank-2 .leader-ticker {
            color: #c0c0c0;
        }

        .rank-3 .leader-ticker {
            color: #cd7f32;
        }

        .leader-name {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .leader-performance {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .rank-1 .leader-performance {
            color: #ffd700;
        }

        .rank-2 .leader-performance {
            color: #c0c0c0;
        }

        .rank-3 .leader-performance {
            color: #cd7f32;
        }

        .leader-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .last-updated {
            color: #555;
            font-size: 0.75rem;
            margin-top: 20px;
            text-align: center;
        }

        /* Watchlist Grid */
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #333);
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, #333, transparent);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            min-height: 140px;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 255, 136, 0.3);
            transform: translateY(-2px);
        }

        .card.leader-highlight {
            border-color: rgba(0,255,136,0.5);
            background: linear-gradient(135deg, rgba(0,255,136,0.08) 0%, rgba(0,255,136,0.02) 100%);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
        }

        .ticker {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00ff88;
        }

        .price-container {
            text-align: right;
        }

        .price {
            font-size: 1.25rem;
            font-weight: 600;
            color: #ffffff;
        }

        .price-loading {
            color: #555;
            font-size: 0.85rem;
        }

        .change {
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 2px;
        }

        .change.positive { color: #00ff88; }
        .change.negative { color: #ff4444; }
        .change.neutral { color: #888; }

        .high-low {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.8rem;
        }

        .high-low-item {
            text-align: center;
        }

        .high-low-label {
            color: #666;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .high-low-value {
            color: #fff;
            font-weight: 600;
            margin-top: 2px;
        }

        .high-value { color: #00ff88; }
        .low-value { color: #ff4444; }

        .name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .description {
            font-size: 0.85rem;
            color: #999;
            line-height: 1.4;
            flex-grow: 1;
        }

        .category-tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 10px;
            border-radius: 20px;
            margin-top: 12px;
            width: fit-content;
        }

        .commodity { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .energy { background: rgba(255, 87, 34, 0.2); color: #ff5722; }
        .chemicals { background: rgba(156, 39, 176, 0.2); color: #ce93d8; }
        .agriculture { background: rgba(76, 175, 80, 0.2); color: #81c784; }
        .crypto { background: rgba(0, 255, 136, 0.2); color: #00ff88; }

        .weekly-change {
            margin-top: 8px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            display: inline-block;
        }

        .weekly-change.positive {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
        }

        .weekly-change.negative {
            background: rgba(255,68,68,0.2);
            color: #ff4444;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            color: #555;
            font-size: 0.85rem;
        }

        @media (max-width: 900px) {
            .leaders-grid {
                grid-template-columns: 1fr;
            }
            
            .leader-card.rank-1 {
                order: 0;
            }
            
            h1 { font-size: 1.8rem; }
            .grid { grid-template-columns: 1fr; }
            
            .leaders-header {
                flex-wrap: wrap;
                text-align: center;
            }
            
            .leaders-header .date-range {
                margin-left: 0;
                width: 100%;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>INNERG TRADER WATCHLIST</h1>
            <p class="subtitle">FOR ENERGY, AGRICULTURE & CHEMICAL SECTORS</p>
            <p class="tagline">INNERG INTEL DISCORD EXCLUSIVE</p>
        </header>

        <!-- Weekly Leaders Section -->
        <div class="leaders-section">
            <div class="leaders-header">
                <span class="crown">👑</span>
                <h2>Weekly Leaders</h2>
                <span class="date-range" id="weekRange">Week of --</span>
            </div>
            
            <div class="leaders-grid" id="leadersGrid">
                <!-- Leaders will be populated here -->
            </div>
            
            <p class="last-updated" id="lastUpdated">Calculating weekly performance...</p>
        </div>

        <!-- Full Watchlist -->
        <div class="section-title">Full Watchlist</div>
        <div class="grid" id="watchlistGrid">
            <!-- Cards will be dynamically sorted by weekly performance -->
        </div>

        <footer>
            <p>InnerG Ecosystem • Not financial advice • DYOR</p>
        </footer>
    </div>

    <script>
        const API_KEY = 'd6qctv1r01qhcrmjo040d6qctv1r01qhcrmjo04g';
        
        // Stock data — Monday baseline prices auto-fetched from API
        const stocks = [
            { ticker: 'USO', name: 'Crude Oil (via USO ETF)', description: 'West Texas Intermediate crude oil exposure', category: 'commodity' },
            { ticker: 'CORN', name: 'Teucrium Corn Fund', description: 'Commodity ETF tracking corn futures prices', category: 'agriculture' },
            { ticker: 'GSG', name: 'iShares S&P GSCI Commodity-Indexed Trust', description: 'All commodity strategy K-1 free ETF', category: 'commodity' },
            { ticker: 'CANE', name: 'Teucrium Sugar Fund', description: 'Commodity ETF tracking sugar futures', category: 'agriculture' },
            { ticker: 'EMN', name: 'Eastman Chemical Company', description: 'Specialty materials and chemical manufacturing', category: 'chemicals' },
            { ticker: 'LYB', name: 'LyondellBasell Industries', description: 'Large global chemical and plastics manufacturer', category: 'chemicals' },
            { ticker: 'OLN', name: 'Olin Corporation', description: 'Chemicals + ammunition manufacturing', category: 'chemicals' },
            { ticker: 'OXY', name: 'Occidental Petroleum Corporation', description: 'Major U.S. oil and gas company', category: 'energy' },
            { ticker: 'MTDR', name: 'Matador Resources Company', description: 'Independent oil and gas exploration company', category: 'energy' },
            { ticker: 'COP', name: 'ConocoPhillips', description: 'One of the largest oil exploration and production companies', category: 'energy' },
            { ticker: 'NTR', name: 'Nutrien Ltd', description: 'World\'s largest fertilizer producer', category: 'agriculture' },
            { ticker: 'MOS', name: 'The Mosaic Company', description: 'Major producer of potash and phosphate fertilizers', category: 'agriculture' },
            { ticker: 'MSTR', name: 'Strategy Inc. (formerly MicroStrategy)', description: 'Known for large Bitcoin holdings', category: 'crypto' }
        ];

        // Cache Monday prices in localStorage for the week
        function getMondayKey() {
            const now = new Date();
            const day = now.getDay();
            const diff = now.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(now.setDate(diff));
            return `watchlist_monday_${monday.toISOString().split('T')[0]}`;
        }

        function getCachedMondayPrices() {
            const key = getMondayKey();
            const cached = localStorage.getItem(key);
            return cached ? JSON.parse(cached) : null;
        }

        function cacheMondayPrices(prices) {
            const key = getMondayKey();
            localStorage.setItem(key, JSON.stringify(prices));
        }

        async function fetchMondayOpen(ticker) {
            try {
                // Get Monday 9:30 AM timestamp (market open)
                const now = new Date();
                const day = now.getDay();
                const diff = now.getDate() - day + (day === 0 ? -6 : 1);
                const monday = new Date(now.setDate(diff));
                monday.setHours(9, 30, 0, 0);
                const from = Math.floor(monday.getTime() / 1000);
                const to = from + 3600; // 1 hour window
                
                const url = `https://finnhub.io/api/v1/stock/candle?symbol=${ticker}&resolution=1&from=${from}&to=${to}&token=${API_KEY}`;
                const resp = await fetch(url);
                const data = await resp.json();
                
                if (data.o && data.o.length > 0) {
                    return data.o[0]; // Opening price
                }
                
                // Fallback: use previous Friday's close
                const quote = await fetchPrice(ticker);
                return quote?.pc || null;
            } catch (e) {
                console.error(`Error fetching Monday open for ${ticker}:`, e);
                return null;
            }
        }

        async function getMondayPrices() {
            let cached = getCachedMondayPrices();
            if (cached) {
                console.log('Using cached Monday prices');
                return cached;
            }
            
            console.log('Fetching fresh Monday prices...');
            const prices = {};
            for (let i = 0; i < stocks.length; i++) {
                const price = await fetchMondayOpen(stocks[i].ticker);
                if (price) prices[stocks[i].ticker] = price;
                await new Promise(r => setTimeout(r, 250)); // Rate limit
            }
            cacheMondayPrices(prices);
            return prices;
        }

        let stockData = {};

        async function fetchPrice(ticker) {
            try {
                const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${API_KEY}`);
                const data = await response.json();
                return data;
            } catch (error) {
                console.error(`Error fetching ${ticker}:`, error);
                return null;
            }
        }

        async function fetchMetrics(ticker) {
            try {
                const response = await fetch(`https://finnhub.io/api/v1/stock/metric?symbol=${ticker}&metric=all&token=${API_KEY}`);
                const data = await response.json();
                return data;
            } catch (error) {
                console.error(`Error fetching metrics ${ticker}:`, error);
                return null;
            }
        }

        function formatPrice(price) {
            return price ? `$${price.toFixed(2)}` : '--';
        }

        function formatChange(current, previousClose) {
            if (!current || !previousClose) return { text: '', class: 'neutral', percent: 0 };
            
            const change = current - previousClose;
            const percentChange = (change / previousClose) * 100;
            
            if (change > 0) {
                return { text: `+${percentChange.toFixed(2)}%`, class: 'positive', percent: percentChange };
            } else if (change < 0) {
                return { text: `${percentChange.toFixed(2)}%`, class: 'negative', percent: percentChange };
            } else {
                return { text: '0.00%', class: 'neutral', percent: 0 };
            }
        }

        function calculateWeeklyChange(currentPrice, mondayPrice) {
            if (!currentPrice || !mondayPrice) return { percent: 0, class: 'neutral', text: '—' };
            const change = currentPrice - mondayPrice;
            const percentChange = (change / mondayPrice) * 100;
            return {
                percent: percentChange,
                class: percentChange > 0 ? 'positive' : percentChange < 0 ? 'negative' : 'neutral',
                text: percentChange > 0 ? `+${percentChange.toFixed(2)}%` : `${percentChange.toFixed(2)}%`
            };
        }

        function getWeekRange() {
            const now = new Date();
            const day = now.getDay();
            const diff = now.getDate() - day + (day === 0 ? -6 : 1); // adjust when day is Sunday
            const monday = new Date(now.setDate(diff));
            const friday = new Date(monday);
            friday.setDate(monday.getDate() + 4);
            
            const format = (date) => date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            return `${format(monday)} - ${format(friday)}`;
        }

        function createLeaderCard(stock, rank, weeklyChange, currentPrice) {
            return `
                <div class="leader-card rank-${rank}">
                    <div class="rank-badge">${rank === 1 ? '1st' : rank === 2 ? '2nd' : '3rd'}</div>
                    <div class="leader-ticker">${stock.ticker}</div>
                    <div class="leader-name">${stock.name}</div>
                    <div class="leader-performance">${weeklyChange.text}</div>
                    <div class="leader-label">Since Monday</div>
                </div>
            `;
        }

        function createWatchlistCard(stock, priceData, weeklyChange, isLeader) {
            const dailyChange = formatChange(priceData?.c, priceData?.pc);
            const high52 = priceData?.h || '--';
            const low52 = priceData?.l || '--';
            
            return `
                <div class="card ${isLeader ? 'leader-highlight' : ''}" data-ticker="${stock.ticker}">
                    <div class="card-header">
                        <div class="ticker">${stock.ticker}</div>
                        <div class="price-container">
                            <div class="price">${formatPrice(priceData?.c)}</div>
                            <div class="change ${dailyChange.class}">${dailyChange.text}</div>
                        </div>
                    </div>
                    <div class="name">${stock.name}</div>
                    <div class="description">${stock.description}</div>
                    <span class="category-tag ${stock.category}">${stock.category}</span>
                    <div class="weekly-change ${weeklyChange.class}">
                        ${weeklyChange.text} this week
                    </div>
                    <div class="high-low">
                        <div class="high-low-item">
                            <div class="high-low-label">High</div>
                            <div class="high-low-value high-value">${formatPrice(high52)}</div>
                        </div>
                        <div class="high-low-item">
                            <div class="high-low-label">Low</div>
                            <div class="high-low-value low-value">${formatPrice(low52)}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function updateAllData() {
            const mondayPrices = await getMondayPrices();
            
            const updatePromises = stocks.map(async (stock, index) => {
                // Stagger requests to avoid rate limiting
                await new Promise(resolve => setTimeout(resolve, index * 200));
                
                const priceData = await fetchPrice(stock.ticker);
                const mondayPrice = mondayPrices[stock.ticker];
                
                if (priceData && priceData.c && mondayPrice) {
                    const weeklyChange = calculateWeeklyChange(priceData.c, mondayPrice);
                    
                    stockData[stock.ticker] = {
                        ...stock,
                        currentPrice: priceData.c,
                        previousClose: priceData.pc,
                        high: priceData.h,
                        low: priceData.l,
                        mondayPrice: mondayPrice,
                        weeklyChange: weeklyChange
                    };
                }
            });

            await Promise.all(updatePromises);
            
            // Sort by weekly performance
            const sortedStocks = Object.values(stockData).sort((a, b) => 
                b.weeklyChange.percent - a.weeklyChange.percent
            );
            
            // Get top 3 leaders
            const top3 = sortedStocks.slice(0, 3);
            
            // Update leaders section
            const leadersGrid = document.getElementById('leadersGrid');
            leadersGrid.innerHTML = top3.map((stock, index) => 
                createLeaderCard(stock, index + 1, stock.weeklyChange, stock.currentPrice)
            ).join('');
            
            // Update watchlist grid (sorted by weekly performance)
            const watchlistGrid = document.getElementById('watchlistGrid');
            watchlistGrid.innerHTML = sortedStocks.map((stock) => {
                const isLeader = top3.some(leader => leader.ticker === stock.ticker);
                return createWatchlistCard(
                    stock, 
                    { c: stock.currentPrice, pc: stock.previousClose, h: stock.high, l: stock.low },
                    stock.weeklyChange,
                    isLeader
                );
            }).join('');
            
            // Update timestamps
            document.getElementById('weekRange').textContent = `Week of ${getWeekRange()}`;
            const now = new Date();
            document.getElementById('lastUpdated').textContent = 
                `Updated: ${now.toLocaleDateString('en-US')} ${now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}`;
        }

        // Initial load
        updateAllData();

        // Refresh every 5 minutes
        setInterval(updateAllData, 5 * 60 * 1000);
    </script>
</body>
</html>
